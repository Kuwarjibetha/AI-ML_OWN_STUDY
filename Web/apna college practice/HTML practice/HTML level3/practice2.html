<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice 2</title>
</head>

<body>
    <form action="/HTML level1">
        <div>
            <label for="username">Name:</label>
            <input type="text" id="username" placeholder="enter your name">
        </div>
        <span>Gender
        
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">male</label>
        
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">female</label>
    </span>
    <div><label for="country">Select country:-</label>
        <select id="country" name="country">
            <option>select</option>
            <option value="america">USA</option>
            <option value="dubai">UAE</option>
            <option value="India">India</option>
            <option value="Germany">Germany</option>
        </select>
    </div>
    <br>
    <div><label for="comment">Message:-</label>
        <textarea id="comment" name="comment" placeholder="enter your message"></textarea>
    </div>

    <div>
      
        <input type="checkbox" id="checklist">
        <label for="checklist">Subscribe ?</label>
    </div>
    <br>
    <div>
        <button>Submit</button>
    </div>
    </form>
</body>

</html>
